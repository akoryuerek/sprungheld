<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Sprungheld 🦘 — ein Doodle-Jump-Spiel</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { height:100%; background:#0b1020; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; overflow:hidden; }
  #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; }
  canvas { background:linear-gradient(180deg,#bfe3ff 0%,#e8f7ff 60%,#fff 100%); box-shadow:0 0 40px rgba(0,0,0,.5); touch-action:none; display:block; }
  .overlay { position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#10233a; text-align:center; pointer-events:none; padding:20px; }
  .overlay.hidden { display:none; }
  .card { background:rgba(255,255,255,.92); border-radius:18px; padding:26px 30px; box-shadow:0 10px 30px rgba(0,0,0,.25); pointer-events:auto; max-width:320px; }
  h1 { font-size:26px; margin-bottom:6px; color:#e8632a; }
  p { font-size:14px; line-height:1.5; color:#33506e; margin:8px 0; }
  .big { font-size:40px; font-weight:800; color:#10233a; margin:6px 0; }
  button { margin-top:14px; background:#e8632a; color:#fff; border:0; border-radius:12px; padding:12px 26px;
    font-size:17px; font-weight:700; cursor:pointer; box-shadow:0 4px 0 #b94714; }
  button:active { transform:translateY(3px); box-shadow:0 1px 0 #b94714; }
  .hint { font-size:12px; color:#7188a3; margin-top:12px; }
  #hud { position:absolute; top:10px; left:0; right:0; text-align:center; color:#10233a; font-weight:800; font-size:20px;
    text-shadow:0 1px 2px rgba(255,255,255,.7); pointer-events:none; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="game"></canvas>
  <div id="hud"></div>
  <div id="start" class="overlay">
    <div class="card">
      <h1>Sprungheld 🦘</h1>
      <p>Spring von Plattform zu Plattform und komm so hoch wie möglich!</p>
      <p><b>Steuerung</b><br>⌨️ Pfeiltasten oder A / D<br>📱 Handy neigen oder linke/rechte Bildschirmhälfte tippen</p>
      <button id="startBtn">Los geht's!</button>
      <div class="hint">🟫 zerbricht · 🔵 bewegt sich · 🟡 Sprungfeder</div>
    </div>
  </div>
  <div id="over" class="overlay hidden">
    <div class="card">
      <h1>Game Over</h1>
      <p>Höhe</p>
      <div class="big" id="finalScore">0</div>
      <p>🏆 Best: <span id="bestScore">0</span></p>
      <button id="retryBtn">Nochmal</button>
    </div>
  </div>
</div>
<script>
(function(){
  const cv = document.getElementById('game');
  const ctx = cv.getContext('2d');
  const hud = document.getElementById('hud');
  const startEl = document.getElementById('start');
  const overEl = document.getElementById('over');

  // logical resolution (portrait); scaled to viewport
  const W = 400, H = 640;
  let scale = 1, dpr = Math.min(window.devicePixelRatio||1, 2);

  function resize(){
    const vw = window.innerWidth, vh = window.innerHeight;
    scale = Math.min(vw / W, vh / H);
    cv.style.width = (W*scale)+'px';
    cv.style.height = (H*scale)+'px';
    cv.width = Math.round(W*dpr);
    cv.height = Math.round(H*dpr);
    ctx.setTransform(dpr,0,0,dpr,0,0);
  }
  window.addEventListener('resize', resize);
  resize();

  const GRAV = 0.35, JUMP = -13.2, SPRING = -22, MOVE = 5.2, MAXDX = 7.5;

  let player, platforms, score, best, running, cameraY, dx, tiltDir;
  best = parseInt(localStorage.getItem('sprungheld_best')||'0',10);

  function rnd(a,b){ return a + Math.random()*(b-a); }

  function makePlatform(y){
    const r = Math.random();
    let type = 'normal';
    if (score>1500 && r<0.18) type='break';
    else if (score>600 && r<0.40) type='move';
    const w = 64;
    const p = { x: rnd(0, W-w), y, w, h:14, type, vx: type==='move'? (Math.random()<.5?-1.4:1.4):0, dead:false,
                spring: (type==='normal' && Math.random()<0.12) };
    return p;
  }

  function reset(){
    player = { x: W/2-18, y: H-120, w:36, h:36, vy: JUMP, face:1 };
    platforms = [];
    // starting platform under player
    platforms.push({x:W/2-32,y:H-70,w:64,h:14,type:'normal',vx:0,dead:false,spring:false});
    let y = H-70;
    for (let i=0;i<14;i++){ y -= rnd(60,95); platforms.push(makePlatform(y)); }
    score = 0; cameraY = 0; dx = 0; tiltDir = 0; running = true;
  }

  function spawnAbove(){
    // keep platforms populated above the top
    let minY = Infinity;
    for (const p of platforms) if (p.y < minY) minY = p.y;
    while (minY > cameraY - 40){
      minY -= rnd(60, 95);
      platforms.push(makePlatform(minY));
    }
  }

  // ---- input ----
  const keys = {};
  addEventListener('keydown', e=>{ if(['ArrowLeft','ArrowRight','a','d','A','D',' '].includes(e.key)) e.preventDefault(); keys[e.key]=true; });
  addEventListener('keyup', e=>{ keys[e.key]=false; });

  // touch: left/right half
  let touchDir = 0;
  function touchHandler(e){
    if (!e.touches || e.touches.length===0){ touchDir=0; return; }
    const t = e.touches[0];
    touchDir = (t.clientX < window.innerWidth/2) ? -1 : 1;
  }
  cv.addEventListener('touchstart', e=>{ e.preventDefault(); touchHandler(e); }, {passive:false});
  cv.addEventListener('touchmove', e=>{ e.preventDefault(); touchHandler(e); }, {passive:false});
  cv.addEventListener('touchend', e=>{ e.preventDefault(); touchHandler(e); }, {passive:false});

  // tilt
  addEventListener('deviceorientation', e=>{
    if (e.gamma==null) return;
    tiltDir = Math.max(-1, Math.min(1, e.gamma/25));
  });

  function inputDir(){
    let d = 0;
    if (keys['ArrowLeft']||keys['a']||keys['A']) d -= 1;
    if (keys['ArrowRight']||keys['d']||keys['D']) d += 1;
    if (touchDir) d += touchDir;
    if (Math.abs(tiltDir)>0.08) d += tiltDir;
    return Math.max(-1, Math.min(1, d));
  }

  function update(){
    const d = inputDir();
    dx = dx*0.8 + d*MOVE*0.2*2;
    dx = Math.max(-MAXDX, Math.min(MAXDX, d? dx : dx*0.85));
    player.x += dx;
    if (d>0) player.face=1; else if (d<0) player.face=-1;

    // wrap horizontally (classic)
    if (player.x > W) player.x = -player.w;
    if (player.x + player.w < 0) player.x = W;

    player.vy += GRAV;
    player.y += player.vy;

    // move platforms
    for (const p of platforms){
      if (p.type==='move'){ p.x += p.vx; if (p.x<0||p.x+p.w>W) p.vx*=-1; }
    }

    // collision (only when falling)
    if (player.vy > 0){
      for (const p of platforms){
        if (p.dead) continue;
        if (player.x+player.w > p.x+6 && player.x < p.x+p.w-6 &&
            player.y+player.h > p.y && player.y+player.h < p.y+p.h+player.vy+2){
          if (p.type==='break'){ p.dead = true; /* fall through */ }
          else {
            player.vy = p.spring ? SPRING : JUMP;
          }
          break;
        }
      }
    }

    // camera follows up
    const target = H*0.42;
    if (player.y < cameraY + target){
      const diff = (cameraY + target) - player.y;
      cameraY -= diff;
      score += diff;
    }

    // cleanup + respawn
    platforms = platforms.filter(p => p.y < cameraY + H + 40 && !(p.dead && p.fadeDone));
    for (const p of platforms){ if (p.dead) { p.fade=(p.fade||0)+1; if(p.fade>10)p.fadeDone=true; } }
    spawnAbove();

    // death
    if (player.y > cameraY + H + 20){ gameOver(); }

    hud.textContent = Math.floor(score/10) + ' m';
  }

  function rrect(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

  function draw(){
    ctx.clearRect(0,0,W,H);
    // platforms
    for (const p of platforms){
      const sy = p.y - cameraY;
      if (sy < -20 || sy > H+20) continue;
      let col = '#5fbf57', edge='#3f9a39';
      if (p.type==='move'){ col='#4aa3ff'; edge='#2b7fd6'; }
      if (p.type==='break'){ col='#b5793f'; edge='#8a5424'; }
      ctx.globalAlpha = p.dead ? Math.max(0,1-(p.fade||0)/10) : 1;
      rrect(p.x, sy, p.w, p.h, 7); ctx.fillStyle=col; ctx.fill();
      ctx.fillStyle=edge; ctx.fillRect(p.x+4, sy+p.h-4, p.w-8, 3);
      if (p.spring){ ctx.fillStyle='#ffd23f'; rrect(p.x+p.w/2-7, sy-7, 14, 8, 3); ctx.fill(); ctx.fillStyle='#e0a800'; ctx.fillRect(p.x+p.w/2-7, sy-2, 14, 2); }
      ctx.globalAlpha = 1;
    }
    // player (a little jumper)
    const px = player.x, py = player.y - cameraY;
    ctx.save();
    ctx.translate(px+player.w/2, py+player.h/2);
    ctx.scale(player.face, 1);
    // body
    ctx.fillStyle='#7bd05b';
    rrect(-16,-14,32,28,12); ctx.fill();
    // belly
    ctx.fillStyle='#d9f7c4'; rrect(-9,-2,18,14,7); ctx.fill();
    // eyes
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(-5,-7,5,0,7); ctx.arc(8,-7,4,0,7); ctx.fill();
    ctx.fillStyle='#173'; ctx.beginPath(); ctx.arc(-4,-7,2.2,0,7); ctx.arc(9,-7,2,0,7); ctx.fill();
    // feet (point down when falling)
    ctx.fillStyle='#5aa83f';
    const fl = player.vy>0? 12: 8;
    ctx.fillRect(-12,12,7,fl); ctx.fillRect(6,12,7,fl);
    ctx.restore();
  }

  let raf;
  function loop(){
    if (!running) return;
    update(); draw();
    raf = requestAnimationFrame(loop);
  }

  function start(){
    startEl.classList.add('hidden');
    overEl.classList.add('hidden');
    reset();
    cancelAnimationFrame(raf);
    loop();
  }

  function gameOver(){
    running = false;
    const s = Math.floor(score/10);
    if (s > best){ best = s; localStorage.setItem('sprungheld_best', String(best)); }
    document.getElementById('finalScore').textContent = s + ' m';
    document.getElementById('bestScore').textContent = best + ' m';
    overEl.classList.remove('hidden');
  }

  document.getElementById('startBtn').addEventListener('click', ()=>{
    // request tilt permission on iOS
    if (typeof DeviceOrientationEvent!=='undefined' && DeviceOrientationEvent.requestPermission){
      DeviceOrientationEvent.requestPermission().catch(()=>{});
    }
    start();
  });
  document.getElementById('retryBtn').addEventListener('click', start);
  document.getElementById('bestScore').textContent = best+' m';
})();
</script>
</body>
</html>
